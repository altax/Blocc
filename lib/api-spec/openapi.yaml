openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Twitch Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot control operations
  - name: settings
    description: Bot settings
  - name: logs
    description: Bot event logs
  - name: messages
    description: Bot message history
  - name: patterns
    description: Chat learning patterns
  - name: stats
    description: Bot statistics
  - name: streamers
    description: Per-streamer data collection and analysis
  - name: scheduler
    description: Auto-scheduler for live detection and chat collection

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the bot
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the bot
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get bot settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update bot settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"

  /logs:
    get:
      operationId: getLogs
      tags: [logs]
      summary: Get recent bot event logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: type
          in: query
          schema:
            type: string
            enum: [vision, speech, chat, decision, message_sent, error]
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"

  /messages:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get bot message history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotMessage"

  /patterns:
    get:
      operationId: getPatterns
      tags: [patterns]
      summary: Get learned chat patterns
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: language
          in: query
          schema:
            type: string
        - name: game
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Patterns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatPattern"
    post:
      operationId: learnFromChannel
      tags: [patterns]
      summary: Trigger learning from a Twitch channel's recent chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LearnRequest"
      responses:
        "200":
          description: Learning started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearnResponse"
    delete:
      operationId: clearPatterns
      tags: [patterns]
      summary: Clear all learned patterns
      responses:
        "200":
          description: Patterns cleared
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: integer

  /patterns/bulk-learn:
    post:
      operationId: bulkLearnFromStreamers
      tags: [patterns]
      summary: Learn from multiple preset Russian CS2 streamers at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkLearnRequest"
      responses:
        "200":
          description: Bulk learning started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkLearnResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get bot statistics summary
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStats"

  /scheduler/status:
    get:
      operationId: getSchedulerStatus
      tags: [scheduler]
      summary: Get auto-scheduler status
      responses:
        "200":
          description: Scheduler status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatus"

  /scheduler/start:
    post:
      operationId: startScheduler
      tags: [scheduler]
      summary: Start or reconfigure the auto-scheduler
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchedulerStartRequest"
      responses:
        "200":
          description: Scheduler started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatus"

  /scheduler/stop:
    post:
      operationId: stopScheduler
      tags: [scheduler]
      summary: Stop the auto-scheduler
      responses:
        "200":
          description: Scheduler stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatus"

  /scheduler/run-now:
    post:
      operationId: runSchedulerNow
      tags: [scheduler]
      summary: Trigger an immediate live detection + auto-collect run
      responses:
        "200":
          description: Run triggered
          content:
            application/json:
              schema:
                type: object
                required: [started, message]
                properties:
                  started:
                    type: boolean
                  message:
                    type: string

  /streamers:
    get:
      operationId: listStreamers
      tags: [streamers]
      summary: List all streamers with collected data files
      responses:
        "200":
          description: Streamers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StreamerFile"

  /streamers/presets:
    get:
      operationId: getStreamerPresets
      tags: [streamers]
      summary: Get preset entertainment Russian CS2 streamers
      responses:
        "200":
          description: Preset streamers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StreamerPreset"

  /streamers/detect-live-sync:
    post:
      operationId: detectLiveChannels
      tags: [streamers]
      summary: Detect which preset channels are currently live (30s IRC window)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectLiveRequest"
      responses:
        "200":
          description: Live detection results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveDetectionResult"

  /streamers/{channel}/collect:
    post:
      operationId: collectStreamerChat
      tags: [streamers]
      summary: Start collecting chat from a specific streamer channel
      parameters:
        - name: channel
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectChatRequest"
      responses:
        "200":
          description: Collection started
          content:
            application/json:
              schema:
                type: object
                required: [started, channel, message_count]
                properties:
                  started:
                    type: boolean
                  channel:
                    type: string
                  message_count:
                    type: integer

  /streamers/{channel}/analysis:
    get:
      operationId: getStreamerAnalysis
      tags: [streamers]
      summary: Get analysis for a specific streamer
      parameters:
        - name: channel
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Streamer analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamerAnalysis"
        "404":
          description: No data found

  /streamers/{channel}/patterns:
    get:
      operationId: getStreamerPatterns
      tags: [streamers]
      summary: Get saved patterns for a streamer from file
      parameters:
        - name: channel
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Streamer patterns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatternEntry"
        "404":
          description: No data found

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    BotStatus:
      type: object
      required: [running, channel, uptime_seconds, messages_sent, last_action]
      properties:
        running:
          type: boolean
        channel:
          type: ["string", "null"]
        uptime_seconds:
          type: integer
        messages_sent:
          type: integer
        last_action:
          type: ["string", "null"]

    BotSettings:
      type: object
      required:
        - id
        - channel_name
        - bot_username
        - personality
        - min_delay_seconds
        - max_delay_seconds
        - cooldown_seconds
        - respond_to_chat
        - vision_enabled
        - speech_enabled
        - active_hours_start
        - active_hours_end
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        channel_name:
          type: string
        bot_username:
          type: string
        twitch_oauth_token:
          type: string
        openai_api_key:
          type: string
        gemini_api_key:
          type: string
        personality:
          type: string
        min_delay_seconds:
          type: integer
        max_delay_seconds:
          type: integer
        cooldown_seconds:
          type: integer
        respond_to_chat:
          type: boolean
        vision_enabled:
          type: boolean
        speech_enabled:
          type: boolean
        active_hours_start:
          type: ["integer", "null"]
        active_hours_end:
          type: ["integer", "null"]
        created_at:
          type: string
        updated_at:
          type: string

    BotSettingsUpdate:
      type: object
      properties:
        channel_name:
          type: string
        bot_username:
          type: string
        twitch_oauth_token:
          type: string
        openai_api_key:
          type: string
        gemini_api_key:
          type: string
        personality:
          type: string
        min_delay_seconds:
          type: integer
        max_delay_seconds:
          type: integer
        cooldown_seconds:
          type: integer
        respond_to_chat:
          type: boolean
        vision_enabled:
          type: boolean
        speech_enabled:
          type: boolean
        active_hours_start:
          type: ["integer", "null"]
        active_hours_end:
          type: ["integer", "null"]

    LogEntry:
      type: object
      required: [id, type, content, created_at]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [vision, speech, chat, decision, message_sent, error]
        content:
          type: string
        metadata:
          type: ["string", "null"]
        created_at:
          type: string

    BotMessage:
      type: object
      required: [id, channel, message, trigger_type, created_at]
      properties:
        id:
          type: integer
        channel:
          type: string
        message:
          type: string
        trigger_type:
          type: string
          enum: [vision, speech, chat_reply, scheduled]
        context_summary:
          type: ["string", "null"]
        created_at:
          type: string

    ChatPattern:
      type: object
      required: [id, source_channel, pattern_type, content, frequency, created_at]
      properties:
        id:
          type: integer
        source_channel:
          type: string
        pattern_type:
          type: string
          enum: [reaction, hype, question, joke, emote_combo, game_specific, cs2_callout, russian_slang]
        content:
          type: string
        frequency:
          type: integer
        language:
          type: string
        game:
          type: string
        created_at:
          type: string

    LearnRequest:
      type: object
      required: [channel]
      properties:
        channel:
          type: string
        message_count:
          type: integer
          default: 500

    LearnResponse:
      type: object
      required: [success, patterns_found, channel]
      properties:
        success:
          type: boolean
        patterns_found:
          type: integer
        channel:
          type: string

    BulkLearnRequest:
      type: object
      properties:
        channels:
          type: array
          items:
            type: string
          description: "Custom channel list. If omitted, uses preset Russian CS2 streamers."
        message_count_per_channel:
          type: integer
          default: 300

    BulkLearnResponse:
      type: object
      required: [success, channels_queued, total_channels]
      properties:
        success:
          type: boolean
        channels_queued:
          type: array
          items:
            type: string
        total_channels:
          type: integer

    BotStats:
      type: object
      required:
        - total_messages_sent
        - messages_today
        - total_patterns_learned
        - channels_learned_from
        - uptime_hours
        - avg_response_delay_seconds
        - most_common_trigger
      properties:
        total_messages_sent:
          type: integer
        messages_today:
          type: integer
        total_patterns_learned:
          type: integer
        channels_learned_from:
          type: integer
        uptime_hours:
          type: number
        avg_response_delay_seconds:
          type: number
        most_common_trigger:
          type: ["string", "null"]

    CollectionRecord:
      type: object
      required: [channel, started_at, trigger]
      properties:
        channel:
          type: string
        started_at:
          type: string
        finished_at:
          type: ["string", "null"]
        patterns_saved:
          type: ["integer", "null"]
        trigger:
          type: string
          enum: [auto, manual]

    SchedulerStatus:
      type: object
      required: [running, check_interval_hours, min_collection_interval_hours, messages_per_channel, total_auto_collections, last_live_channels, currently_collecting, collection_history]
      properties:
        running:
          type: boolean
        check_interval_hours:
          type: number
        min_collection_interval_hours:
          type: number
        messages_per_channel:
          type: integer
        next_check_at:
          type: ["string", "null"]
        last_check_at:
          type: ["string", "null"]
        last_live_channels:
          type: array
          items:
            type: string
        currently_collecting:
          type: array
          items:
            type: string
        collection_history:
          type: array
          items:
            $ref: "#/components/schemas/CollectionRecord"
        total_auto_collections:
          type: integer

    SchedulerStartRequest:
      type: object
      properties:
        check_interval_hours:
          type: number
          default: 3
        min_collection_interval_hours:
          type: number
          default: 12
        messages_per_channel:
          type: integer
          default: 300
        detection_window_seconds:
          type: integer
          default: 30

    DetectLiveRequest:
      type: object
      properties:
        channels:
          type: array
          items:
            type: string
        window_ms:
          type: integer
          default: 30000

    CollectChatRequest:
      type: object
      properties:
        message_count:
          type: integer
          default: 500

    StreamerPreset:
      type: object
      required: [channel, displayName, description, category, priority]
      properties:
        channel:
          type: string
        displayName:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [entertainment, pro, variety]
        priority:
          type: integer

    StreamerFile:
      type: object
      required: [channel, has_raw, has_patterns, has_analysis, total_messages, pattern_count]
      properties:
        channel:
          type: string
        display_name:
          type: string
        category:
          type: string
        description:
          type: string
        has_raw:
          type: boolean
        has_patterns:
          type: boolean
        has_analysis:
          type: boolean
        collected_at:
          type: ["string", "null"]
        total_messages:
          type: integer
        pattern_count:
          type: integer

    ChannelActivity:
      type: object
      required: [channel, message_count, is_live, messages_per_minute, is_cs2]
      properties:
        channel:
          type: string
        message_count:
          type: integer
        is_live:
          type: boolean
        messages_per_minute:
          type: integer
        game_name:
          type: ["string", "null"]
        is_cs2:
          type: boolean

    LiveDetectionResult:
      type: object
      required: [results, detected_at]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ChannelActivity"
        detected_at:
          type: string

    PatternEntry:
      type: object
      required: [content, type, frequency, language, game]
      properties:
        content:
          type: string
        type:
          type: string
        frequency:
          type: integer
        language:
          type: string
        game:
          type: string

    PatternTypeStat:
      type: object
      required: [type, count, percent]
      properties:
        type:
          type: string
        count:
          type: integer
        percent:
          type: integer

    StreamerStats:
      type: object
      required: [total_messages, unique_phrases, ru_ratio, en_ratio, mixed_ratio, cs2_ratio, avg_message_length, top_pattern_types]
      properties:
        total_messages:
          type: integer
        unique_phrases:
          type: integer
        ru_ratio:
          type: integer
        en_ratio:
          type: integer
        mixed_ratio:
          type: integer
        cs2_ratio:
          type: integer
        avg_message_length:
          type: integer
        top_pattern_types:
          type: array
          items:
            $ref: "#/components/schemas/PatternTypeStat"

    StreamerAnalysis:
      type: object
      required: [channel, analyzed_at, stats, top_phrases, sample_messages, style_notes]
      properties:
        channel:
          type: string
        analyzed_at:
          type: string
        stats:
          $ref: "#/components/schemas/StreamerStats"
        top_phrases:
          type: array
          items:
            $ref: "#/components/schemas/PatternEntry"
        sample_messages:
          type: array
          items:
            type: string
        style_notes:
          type: array
          items:
            type: string
